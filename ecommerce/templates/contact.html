{% extends 'base.html' %}
{% load static %}
{% block title %}Contact{% endblock %}

{% block content %}

<div class="max-w-4xl mx-auto px-4 py-12">

  <h2 class="text-3xl font-bold text-center mb-8">Contact Us</h2>

  {% if success %}
  <div class="bg-green-100 text-green-700 p-4 rounded-lg mb-6 text-center">
    ✅ Your message has been sent successfully!
  </div>
  {% endif %}

  <div class="bg-white shadow-lg rounded-2xl p-8">

    <form method="POST">
      {% csrf_token %}

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <div>
          <label class="block mb-2 font-semibold">Full Name</label>
          <input type="text" name="name" required
                 class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div>
          <label class="block mb-2 font-semibold">Email Address</label>
          <input type="email" name="email" required
                 class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

      </div>

      <div class="mt-6">
        <label class="block mb-2 font-semibold">Subject</label>
        <input type="text" name="subject" required
               class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
      </div>

      <div class="mt-6">
        <label class="block mb-2 font-semibold">Message</label>
        <textarea name="message" rows="5" required
                  class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
      </div>

      <div class="mt-8 text-center">
        <button type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl transition duration-300">
          Send Message
        </button>
      </div>

    </form>

  </div>

</div>

{% endblock %}
