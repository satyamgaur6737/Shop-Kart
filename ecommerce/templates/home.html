<div
  class="bg-white rounded-lg shadow-md p-4 flex flex-col border border-gray-100 hover:shadow-lg transition-shadow">

  <a href="{% url 'productdetail' e.id %}" class="block">

    <!-- Image -->
    <div class="w-full h-48 overflow-hidden rounded-lg">
      {% if e.product_image %}
      <img src="{{ e.product_image.url }}" 
           alt="{{ e.title }}" 
           class="w-full h-full object-contain">
      {% else %}
      <div class="w-full h-full bg-gray-100 flex items-center justify-center">
        No Image
      </div>
      {% endif %}
    </div>

    <!-- Content -->
    <div class="flex flex-col mt-3">
      <h3 class="font-semibold text-lg h-12 overflow-hidden">
        {{ e.title }}
      </h3>

      <p class="text-blue-600 text-xl font-bold mt-2">
        ₹{{ e.discounted_price }}
      </p>
      <p class="text-gray-400 text-sm line-through">
        ₹{{ e.selling_price }}
      </p>
    </div>

  </a>

  <!-- Buttons -->
  <div class="mt-auto pt-3 flex gap-2">
    <form action="{% url 'add-to-cart' %}" method="GET" class="flex-1">
      <input type="hidden" name="prod_id" value="{{ e.id }}">
      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-xl text-sm">
        Add to Cart
      </button>
    </form>

    <a href="{% url 'checkout' %}"
      class="flex-1 text-center bg-slate-800 hover:bg-slate-900 text-white py-2 rounded-xl text-sm">
      Buy Now
    </a>
  </div>

</div>
