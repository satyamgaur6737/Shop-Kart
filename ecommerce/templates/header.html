<nav class="bg-white shadow-lg border-b border-gray-100 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4">
    <div class="flex justify-between items-center h-16 gap-4">
      
      <div class="flex-shrink-0 flex items-center">
        <a href="/" class="text-2xl font-extrabold text-blue-600 flex items-center gap-2">
          <span class="bg-blue-600 text-white px-2 py-1 rounded-lg">Shop</span>
          <span class="hidden sm:block tracking-tight">Kart</span>
        </a>
      </div>

      <div class="hidden lg:flex items-center gap-6">
        <a href="/" class="text-gray-700 hover:text-blue-600 font-semibold transition-colors">Home</a>
        <a href="{% url 'shop' %}" class="text-gray-700 hover:text-blue-600 font-semibold transition-colors">Shop</a>
        <a href="{% url 'contact' %}" class="text-gray-700 hover:text-blue-600 font-semibold transition-colors">Contact</a>
      </div>

      <div class="flex-1 max-w-xs md:max-w-sm lg:max-w-md">
  <form action="/search/" method="GET" class="relative group">
    
    <input 
      type="text" 
      name="query" 
      placeholder="Search products..." 
      class="w-full bg-gray-100 border-2 border-transparent focus:bg-white
             focus:ring-0 focus:border-blue-500 rounded-full
             py-2 pl-10 pr-20 transition-all outline-none text-sm"
    >

    <!-- Left search icon -->
    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
      <svg class="h-4 w-4 text-gray-400 group-focus-within:text-blue-500"
           fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
    </div>

    <!-- Right button inside input -->
    <button
      type="submit"
      class="absolute right-1.5 top-1/2 -translate-y-1/2
             bg-blue-600 hover:bg-blue-700 text-white
             text-xs font-semibold px-4 py-1.5 rounded-full transition">
      Search
    </button>

  </form>
</div>


      
  <!-- Geeky Shows -->
   <ul class="flex items-center space-x-6">
  {% if user.is_authenticated %}
  <li>
    <a href="{% url 'showcart' %}" class="relative group p-2 flex items-center">
      <svg class="w-7 h-7 text-gray-700 group-hover:text-blue-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path>
      </svg>
      <span class="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">
       {{total_items}}
      </span>
    </a>
  </li>

  <li>
    <div class="relative flex items-center gap-2">
      <select 
        onchange="if(this.value === 'logout'){ document.getElementById('logout-form').submit(); } else if(this.value) { window.location.href=this.value; }"
        class="bg-white border border-gray-300 rounded-full px-4 py-2 text-gray-700 font-medium focus:outline-none cursor-pointer">
        
        <option selected disabled>{{ user.username }}</option>
        <option value="{% url 'profile' %}">👤 Profile</option>
        <option value="{% url 'orders' %}">📦 Orders</option>
        <option value="{% url 'passwordchange' %}">🔑 Change Password</option>
        <option value="logout">🚪 Logout</option>
      </select>

      <form id="logout-form" action="{% url 'logout' %}" method="POST" style="display: none;">
        {% csrf_token %}
      </form>
    </div>
  </li>
  {% else %}
  <li>
    <a href="{% url 'login' %}" class="text-gray-700 font-medium hover:text-blue-600">Login</a>
  </li>
  <li>
    <a href="{% url 'registration' %}" class="bg-blue-600 text-white px-4 py-2 rounded-full text-sm font-semibold hover:bg-blue-700">Register</a>
  </li>
  {% endif %}
</ul>


</nav>




<script>
  const btn = document.getElementById('mobile-menu-button');
  const menu = document.getElementById('mobile-menu');

  btn.addEventListener('click', () => {
    menu.classList.toggle('hidden');
  });
</script>
