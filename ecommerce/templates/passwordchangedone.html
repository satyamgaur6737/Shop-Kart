{% extends "base.html" %}
{% load static %}

{% block title %}Password Changed{% endblock title %}

{% block content %}
<div class="h-[calc(100vh-64px)] w-full flex items-center justify-center bg-gray-100 overflow-hidden">
  <div class="max-w-md w-full bg-white mb-6 shadow-lg rounded-2xl p-8 text-center">
    
    <!-- Giphy iframe -->
    <div class="mb-6 flex justify-center">
      <iframe 
        src="https://giphy.com/embed/111ebonMs90YLu"
        width="200"
        height="200"
        frameborder="0"
        class="rounded-xl"
        allowfullscreen>
      </iframe>
    </div>

    <!-- Success Icon -->
    <div class="flex justify-center mb-4">
      <div class="h-16 w-16 flex items-center justify-center rounded-full bg-green-100">
        <svg class="h-8 w-8 text-green-600" fill="none" stroke="currentColor" stroke-width="2"
             viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M5 13l4 4L19 7" />
        </svg>
      </div>
    </div>

    <!-- Heading -->
    <h2 class="text-2xl font-bold text-gray-800 mb-2">
      Password Changed Successfully 🎉
    </h2>

    <!-- Message -->
    <p class="text-gray-600 mb-6">
      Your password has been successfully changed. 
      You can now log in with your new password.
    </p>

    <!-- Button -->
    <a href="{% url 'profile' %}"
       class="inline-block w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition">
      Go to Profile
    </a>

  </div>
</div>
{% endblock content %}
